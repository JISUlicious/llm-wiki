m the first episode\n3. Plot accuracy vs. episode count\n\n**Expected**: Without consolidation, accuracy drops. With consolidation, facts promoted to schemas should maintain accuracy.\n\n### 3.2 Consolidation Quality\n\n**Question**: Does `/memory consolidate` improve multi-hop reasoning?\n\n**Protocol**:\n1. Record 10 related episodes\n2. Ask multi-hop questions requiring cross-episode synthesis\n3. Score with and without consolidation\n\n**Measured on**: LoCoMo multi-hop QA, LongMemEval multi-session reasoning\n\n### 3.3 Knowledge Updates\n\n**Question**: When facts change across episodes, does the system track the latest version?\n\n**Protocol**:\n1. Record episode A: \"Alice works at Meta\"\n2. Record episode B (later): \"Alice just started at Google\"\n3. Query: \"Where does Alice work?\"\n4. Score: should answer \"Google\" (not \"Meta\")\n5. Check: does the actor page show `> [!warning] Contradiction` or updated info?\n\n**Measured on**: LongMemEval knowledge update dimension\n\n### 3.4 Abstention\n\n**Question**: Does the system refuse to answer when information was never recorded?\n\n**Protocol**:\n1. Record several episodes about topic A\n2. Query about topic B (never mentioned)\n3. Score: correct abstention = \"I don't have that information\"\n4. Incorrect: hallucinated answer\n\n**Measured on**: LongMemEval abstention dimension, LoCoMo adversarial questions\n\n### 3.5 Temporal Reasoning\n\n**Question**: Can the system reason about when things happened?\n\n**Protocol**:\n1. Record episodes with clear timestamps\n2. Query: \"What happened before/after X?\", \"When did Y occur?\", \"What changed between session 3 and session 10?\"\n3. Score temporal accuracy\n\n**Measured on**: LoCoMo temporal QA, LongMemEval temporal reasoning\n\n### 3.6 Confidence Calibration\n\n**Question**: Do confidence levels in memory pages correlate with answer accuracy?\n\n**Protocol**:\n1. After recording all episodes and consolidating, note confidence levels on all schema/actor pages\n2. Answer all benchmark questions\n3. Partition answers by the confidence level of the memory page(s) that contributed\n4. Compute accuracy per confidence bucket\n\n**Expected**: High-confidence pages should yield more accurate answers than low-confidence ones.\n\n## Phase 4: Ablation Studies\n\nTest which memory skill features contribute most to performance:\n\n| Ablation | What's disabled | What it tests |\n|---|---|---|\n| No consolidation | Skip `/memory consolidate` entirely | Value of episodic \u2192 semantic promotion |\n| No confidence tracking | Remove confidence field, treat all pages equally | Value of reliability signals |\n| No recency weighting | Query treats all pages equally regardless of date | Value of temporal prioritization |\n| No access tracking | Don't update `last_accessed` / `access_count` | Value of usage-based relevance |\n| No contradiction handling | Silently overwrite instead of callouts | Value of explicit conflict tracking |\n| Episodes only | No actor/schema pages, just episode summaries | Value of structured knowledge extraction |\n\nFor each ablation, run the full evaluation protocol and compare against the full memory skill.\n\n## Phase 5: Reporting\n\n### 5.1 Quantitative Report\n\n```markdown\n## Results\n\n### LongMemEval (500 questions)\n\n| Dimension | Raw Context | RAG | Long-Context | Memory Skill | Memory (no consolidation) |\n|---|---|---|---|---|---|\n| Information extraction | | | | | |\n| Multi-session reasoning | | | | | |\n| Temporal reasoning | | | | | |\n| Knowledge updates | | | | | |\n| Abstention | | | | | |\n| **Overall** | | | | | |\n\n### LoCoMo (QA)\n\n| Category | Raw Context | RAG | Long-Context | Memory Skill | Memory (no consolidation) |\n|---|---|---|---|---|---|\n| Single-hop | | | | | |\n| Multi-hop | | | | | |\n| Temporal | | | | | |\n| Open-domain | | | | | |\n| Adversarial | | | | | |\n| **Overall F1** | | | | | |\n```\n\n### 5.2 Qualitative Analysis\n\nFor each failure mode, collect 5-10 representative examples:\n- **False recall**: System \"remembers\" something that was never recorded\n- **Stale recall**: System returns outdated information despite an update\n- **Missed connection**: System fails to connect information across episodes\n- **Consolidation loss**: Information present in episodes but lost during consolidation\n- **Confidence miscalibration**: High-confidence wrong answers or low-confidence correct ones\n\n### 5.3 Actionable Recommendations\n\nMap failure modes to specific skill improvements:\n\n| Failure mode | Potential fix | Skill file to modify |\n|---|---|---|\n| False recall | Strengthen abstention in query.md | `query.md` Step 3 |\n| Stale recall | Improve validity_window checking in query | `query.md` Step 1 |\n| Missed connections | Better cross-referencing in record.md | `record.md` Step 6 |\n| Consolidation loss | More conservative consolidation | `consolidate.md` Step 3 |\n| Confidence miscalibration | Tune confidence thresholds | `record.md` Step 5.5 |\n\n## Timeline\n\n| Phase | Effort | Dependencies |\n|---|---|---|\n| Phase 1: Data preparation | 1-2 days | Dataset downloads |\n| Phase 2: Evaluation protocol | 3-5 days | Converted inputs, automation scripts |\n| Phase 3: Dimension-specific testing | 2-3 days | Phase 2 complete |\n| Phase 4: Ablation studies | 3-5 days | Phase 2 complete |\n| Phase 5: Reporting | 1-2 days | All phases complete |\n| **Total** | **~2 weeks** | |\n\n## References\n\n- [[long-term-memory-benchmarks]] \u2014 Benchmark comparison document\n- [LongMemEval](https://github.com/xiaowu0162/LongMemEval) \u2014 Primary benchmark\n- [LoCoMo](https://github.com/snap-research/locomo) \u2014 Secondary benchmark\n- [LifeBench](https://arxiv.org/abs/2603.03781) \u2014 Tertiary benchmark\n"}], "edges": [{"source": "anthropic", "target": "claude-sonnet"}, {"source": "anthropic", "target": "emotion-concepts-anthropic-2026"}, {"source": "anthropic", "target": "emotion-vectors"}, {"source": "anthropic", "target": "c thought-prompting"}, {"source": "react-synergizing-reasoning-and-acting", "target": "tool-use-in-llms"}, {"source": "reflexion-verbal-reinforcement-learning", "target": "noah-shinn"}, {"source": "reflexion-verbal-reinforcement-learning", "target": "shunyu-yao"}, {"source": "reflexion-verbal-reinforcement-learning", "target": "reflexion"}, {"source": "reflexion-verbal-reinforcement-learning", "target": "chain-of-thought-prompting"}, {"source": "reflexion-verbal-reinforcement-learning", "target": "react"}, {"source": "reflexion-verbal-reinforcement-learning", "target": "tool-use-in-llms"}, {"source": "retrieval-augmented-generation-for-knowledge-intensive-nlp-tasks", "target": "retrieval-augmented-generation"}, {"source": "retrieval-augmented-generation-for-knowledge-intensive-nlp-tasks", "target": "dense-passage-retrieval"}, {"source": "retrieval-augmented-generation-for-knowledge-intensive-nlp-tasks", "target": "transformer-architecture"}, {"source": "gpt-series-upgrade-points", "target": "decoder-only-transformer"}, {"source": "gpt-series-upgrade-points", "target": "generative-pretraining"}, {"source": "gpt-series-upgrade-points", "target": "gpt-1"}, {"source": "gpt-series-upgrade-points", "target": "gpt-2"}, {"source": "gpt-series-upgrade-points", "target": "gpt-3"}, {"source": "gpt-series-upgrade-points", "target": "gpt-4"}, {"source": "gpt-series-upgrade-points", "target": "in-context-learning"}, {"source": "gpt-series-upgrade-points", "target": "improving-language-understanding-by-generative-pre-training"}, {"source": "gpt-series-upgrade-points", "target": "language-models-are-unsupervised-multitask-learners"}, {"source": "gpt-series-upgrade-points", "target": "language-models-are-few-shot-learners"}, {"source": "gpt-series-upgrade-points", "target": "gpt-4-technical-report"}, {"source": "memory-skill-evaluation-plan", "target": "long-term-memory-benchmarks"}], "missing": {}};

  const TYPE_COLORS = {
    entity: "#5b8def",
    concept: "#7bc97e",
    source: "#f0b35e",
    comparison: "#d672c9",
    query: "#888888",
    unknown: "#bbbbbb",
  };

  const svg = d3.select("svg");
  const width = window.innerWidth;
  const height = window.innerHeight;

  const g = svg.append("g");

  svg.call(d3.zoom().scaleExtent([0.2, 4]).on("zoom", (event) => {
    g.attr("transform", event.transform);
  }));

  const simulation = d3.forceSimulation(DATA.nodes)
    .force("link", d3.forceLink(DATA.edges).id(d => d.id).distance(80).strength(0.6))
    .force("charge", d3.forceManyBody().strength(-180))
    .force("center", d3.forceCenter(width / 2, height / 2))
    .force("collide", d3.forceCollide().radius(20));

  const link = g.append("g").selectAll("line")
    .data(DATA.edges).enter().append("line")
    .attr("class", "link");

  const node = g.append("g").selectAll("g")
    .data(DATA.nodes).enter().append("g")
    .attr("class", "node");

  node.append("circle")
    .attr("r", d => 4 + Math.sqrt(degree(d.id)) * 2)
    .attr("fill", d => TYPE_COLORS[d.type] || TYPE_COLORS.unknown)
    .on("mouseover", (event, d) => highlight(d))
    .on("mouseout", () => unhighlight())
    .on("click", (event, d) => showInfo(d));

  node.append("text")
    .attr("dx", 10).attr("dy", 4)
    .text(d => d.title);

  node.call(d3.drag()
    .on("start", (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on("drag", (event, d) => { d.fx = event.x; d.fy = event.y; })
    .on("end", (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

  simulation.on("tick", () => {
    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    node.attr("transform", d => `translate(${d.x},${d.y})`);
  });

  function degree(id) {
    return DATA.edges.filter(e => (e.source.id || e.source) === id || (e.target.id || e.target) === id).length;
  }

  function highlight(d) {
    const neighbors = new Set([d.id]);
    DATA.edges.forEach(e => {
      const s = e.source.id || e.source, t = e.target.id || e.target;
      if (s === d.id) neighbors.add(t);
      if (t === d.id) neighbors.add(s);
    });
    node.classed("dimmed", n => !neighbors.has(n.id));
    link.classed("dimmed", e => {
      const s = e.source.id || e.source, t = e.target.id || e.target;
      return !(s === d.id || t === d.id);
    });
    link.classed("highlighted", e => {
      const s = e.source.id || e.source, t = e.target.id || e.target;
      return s === d.id || t === d.id;
    });
  }

  function unhighlight() {
    node.classed("dimmed", false);
    link.classed("dimmed", false).classed("highlighted", false);
  }

  const NODE_BY_ID = Object.fromEntries(DATA.nodes.map(n => [n.id, n]));

  function slugLink(s) {
    // Match Python's slug() behavior for wikilink targets
    return s.split(/[\/]/).pop().replace(/\.md$/i, "").toLowerCase();
  }

  function rewriteWikilinks(md) {
    // Replace [[target]] or [[target|label]] with anchor tags that route to nodes
    return md.replace(/\[\[([^\]|#]+?)(?:#[^\]|]*)?(?:\|([^\]]+))?\]\]/g, (match, target, label) => {
      const id = slugLink(target.trim());
      const display = (label || target).trim();
      if (NODE_BY_ID[id]) {
        return `<a class="wikilink" data-target="${id}">${display}</a>`;
      }
      return `<span class="wikilink broken" title="page not yet created">${display}</span>`;
    });
  }

  function showInfo(d) {
    const inDeg = DATA.edges.filter(e => (e.target.id || e.target) === d.id).length;
    const outDeg = DATA.edges.filter(e => (e.source.id || e.source) === d.id).length;
    const panel = document.getElementById("panel");
    document.getElementById("panel-title").textContent = d.title;
    document.getElementById("panel-meta").innerHTML =
      `${d.type} · ${d.category} · in ${inDeg} / out ${outDeg} · ` +
      `<a href="./${d.path}" target="_blank">${d.path}</a>`;
    const rewritten = rewriteWikilinks(d.body || "*(no content)*");
    document.getElementById("panel-body").innerHTML = marked.parse(rewritten);
    panel.classList.add("open");
    // Wire wikilinks to switch panels
    panel.querySelectorAll(".wikilink[data-target]").forEach(a => {
      a.addEventListener("click", (e) => {
        e.preventDefault();
        const target = NODE_BY_ID[a.dataset.target];
        if (target) {
          showInfo(target);
          // Briefly highlight in the graph
          highlight(target);
          setTimeout(unhighlight, 1500);
        }
      });
    });
  }

  document.getElementById("panel-close").addEventListener("click", () => {
    document.getElementById("panel").classList.remove("open");
  });

  // Type filter legend
  const types = [...new Set(DATA.nodes.map(n => n.type))].sort();
  const enabled = new Set(types);
  const legendEl = document.getElementById("legend");
  types.forEach(t => {
    const counts = DATA.nodes.filter(n => n.type === t).length;
    const div = document.createElement("div");
    div.className = "legend-item";
    div.innerHTML = `<div class="swatch" style="background:${TYPE_COLORS[t] || TYPE_COLORS.unknown}"></div><span>${t} (${counts})</span>`;
    div.onclick = () => {
      if (enabled.has(t)) { enabled.delete(t); div.classList.add("disabled"); }
      else { enabled.add(t); div.classList.remove("disabled"); }
      applyFilters();
    };
    legendEl.appendChild(div);
  });

  // Search
  document.getElementById("search").addEventListener("input", () => applyFilters());

  function applyFilters() {
    const q = document.getElementById("search").value.toLowerCase();
    node.style("display", d => {
      if (!enabled.has(d.type)) return "none";
      if (q && !d.title.toLowerCase().includes(q) && !d.id.includes(q)) return "none";
      return null;
    });
    const visible = new Set(DATA.nodes.filter(d => enabled.has(d.type) && (!q || d.title.toLowerCase().includes(q) || d.id.includes(q))).map(d => d.id));
    link.style("display", e => {
      const s = e.source.id || e.source, t = e.target.id || e.target;
      return visible.has(s) && visible.has(t) ? null : "none";
    });
  }

  document.getElementById("stats").textContent =
    `${DATA.nodes.length} nodes · ${DATA.edges.length} edges` +
    (Object.keys(DATA.missing).length ? ` · ${Object.keys(DATA.missing).length} missing pages referenced` : "");
  </script>
